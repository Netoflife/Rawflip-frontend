<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReTrade | System Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --admin-dark: #0f172a; --admin-blue: #3b82f6; --admin-bg: #f1f5f9; }
        body { background: var(--admin-bg); font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--admin-dark); min-height: 100vh; color: white; padding: 2rem 1rem; position: fixed; width: 260px; }
        .main-content { margin-left: 260px; padding: 2rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1.5rem; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .table-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 2rem; }
        .status-badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; }
        .nav-link-admin { color: #94a3b8; text-decoration: none; display: block; padding: 0.8rem 1rem; border-radius: 8px; transition: 0.2s; margin-bottom: 0.5rem; }
        .nav-link-admin:hover, .nav-link-admin.active { background: rgba(255,255,255,0.1); color: white; }
        .proof-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .proof-img:hover { transform: scale(3); z-index: 100; position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="fw-bold mb-4 px-3"><i class="bi bi-shield-lock me-2"></i>RE<span class="text-primary">ADMIN</span></h4>
        <nav>
            <a href="#" class="nav-link-admin active" onclick="admin.show('deposits')"><i class="bi bi-wallet2 me-2"></i> Deposits</a>
            <a href="#" class="nav-link-admin" onclick="admin.show('kyc')"><i class="bi bi-person-badge me-2"></i> KYC Verifications</a>
            <a href="#" class="nav-link-admin" onclick="admin.show('escrows')"><i class="bi bi-box-seam me-2"></i> Active Escrows</a>
            <a href="#" class="nav-link-admin" onclick="admin.show('users')"><i class="bi bi-people me-2"></i> User Directory</a>
            <hr class="my-4 opacity-25">
            <a href="#" class="nav-link-admin text-danger" onclick="admin.logout()"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </nav>
    </div>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div><h2 class="fw-bold m-0" id="page-title">Deposit Management</h2><p class="text-muted small">Verify manual bank transfers and update balances.</p></div>
            <button class="btn btn-primary btn-sm rounded-3" onclick="admin.refresh()"><i class="bi bi-arrow-clockwise me-1"></i> Refresh Data</button>
        </header>

        <section id="deposits-view" class="admin-panel">
            <div class="table-card">
                <table class="table table-hover align-middle m-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">User</th>
                            <th>Amount</th>
                            <th>Proof</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="deposit-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="kyc-view" class="admin-panel hidden">
            <div class="table-card">
                <table class="table table-hover align-middle m-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Username</th>
                            <th>ID Document</th>
                            <th>Submitted</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="kyc-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="escrows-view" class="admin-panel hidden">
            <div class="table-card">
                <table class="table table-hover align-middle m-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Listing</th>
                            <th>Buyer</th>
                            <th>Seller</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Control</th>
                        </tr>
                    </thead>
                    <tbody id="escrow-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:3000/api/admin"; // Note: Admin specific endpoints
        const BASE_URL = "http://localhost:3000";
        const TOKEN = localStorage.getItem('token');

        const admin = {
            init: () => {
                if (!TOKEN) { window.location.href = "index.html"; return; }
                admin.loadDeposits();
            },
            show: (panel) => {
                document.querySelectorAll('.admin-panel').forEach(p => p.classList.add('hidden'));
                document.querySelectorAll('.nav-link-admin').forEach(l => l.classList.remove('active'));
                document.getElementById(`${panel}-view`).classList.remove('hidden');
                event.target.classList.add('active');
                
                if(panel === 'deposits') admin.loadDeposits();
                if(panel === 'kyc') admin.loadKYC();
                if(panel === 'escrows') admin.loadEscrows();
            },
            refresh: () => location.reload(),
            
            fetch: async (ep, method = 'GET', body = null) => {
                const opt = { 
                    method, 
                    headers: { 'Authorization': TOKEN, 'Content-Type': 'application/json' } 
                };
                if(body) opt.body = JSON.stringify(body);
                const r = await fetch(`${BASE_URL}${ep}`, opt);
                return await r.json();
            },

            loadDeposits: async () => {
                const data = await admin.fetch('/admin/deposits');
                const html = data.map(d => `
                    <tr>
                        <td class="ps-4"><b>${d.username}</b></td>
                        <td>${d.amount}</td>
                        <td>${d.proof ? `<img src="${BASE_URL}/${d.proof}" class="proof-img">` : 'No Proof'}</td>
                        <td class="small text-muted">${new Date(d.date).toLocaleDateString()}</td>
                        <td><span class="status-badge bg-warning text-dark">${d.status}</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-success btn-sm" onclick="admin.action('deposit/approve', '${d._id}')">Approve</button>
                            <button class="btn btn-outline-danger btn-sm" onclick="admin.action('deposit/reject', '${d._id}')">Reject</button>
                        </td>
                    </tr>
                `).join('');
                document.getElementById('deposit-table-body').innerHTML = html || '<tr><td colspan="6" class="text-center p-4">No pending deposits</td></tr>';
            },

            loadKYC: async () => {
                const data = await admin.fetch('/admin/kyc-pending');
                const html = data.map(u => `
                    <tr>
                        <td class="ps-4"><b>${u.username}</b><br><small>${u.email}</small></td>
                        <td><img src="${BASE_URL}/${u.kycFile}" class="proof-img"></td>
                        <td>${new Date().toLocaleDateString()}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-primary btn-sm" onclick="admin.action('user/verify', '${u._id}')">Verify ID</button>
                        </td>
                    </tr>
                `).join('');
                document.getElementById('kyc-table-body').innerHTML = html || '<tr><td colspan="4" class="text-center p-4">No pending KYC</td></tr>';
            },

            action: async (endpoint, id) => {
                if(!confirm("Are you sure you want to perform this administrative action?")) return;
                const res = await admin.fetch(`/admin/${endpoint}`, 'POST', { id });
                if(!res.error) {
                    alert("Action successful");
                    admin.refresh();
                } else {
                    alert(res.error);
                }
            },

            logout: () => { localStorage.clear(); window.location.href = "index.html"; }
        };

        window.onload = admin.init;
    </script>
</body>
</html>
